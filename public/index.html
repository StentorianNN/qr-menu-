<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Osteria Marconi — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fdfcf8;
    --ink: #173b2c;        /* deep basil green */
    --ink-soft: #4f6457;
    --accent: #c2331f;     /* tomato red */
    --line: #d9d4c7;
    --display: "Fraunces", Georgia, serif;
    --body: "Karla", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding: 3rem 1.25rem 1.5rem;
  }
  header .crest {
    font-family: var(--display);
    font-weight: 500;
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(2.1rem, 8vw, 3rem);
    line-height: 1.05;
    margin-top: 0.5rem;
  }
  header .tagline {
    margin-top: 0.5rem;
    color: var(--ink-soft);
    font-size: 0.95rem;
  }

  /* ---------- Sticky category nav ---------- */
  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(6px);
    border-block: 1px solid var(--line);
    display: flex;
    gap: 0.25rem;
    overflow-x: auto;
    padding: 0.6rem 1rem;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav a {
    flex: 0 0 auto;
    text-decoration: none;
    color: var(--ink-soft);
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    transition: color 0.15s, background 0.15s;
  }
  nav a.active, nav a:hover {
    color: var(--paper);
    background: var(--ink);
  }
  nav a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- Menu sections ---------- */
  main { max-width: 640px; margin: 0 auto; padding: 0 1.25rem 4rem; }
  section { padding-top: 2.25rem; scroll-margin-top: 4rem; }
  section h2 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  section h2::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .item {
    padding: 1.1rem 0;
    display: flex;
    gap: 0.9rem;
    align-items: flex-start;
  }
  .item + .item { border-top: 1px dashed var(--line); }
  .item .thumb {
    flex: 0 0 auto;
    width: 72px;
    height: 72px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--line);
  }
  .item .content { flex: 1; min-width: 0; }
  .item .row {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
  }
  .item .name { font-weight: 700; font-size: 1.02rem; }
  /* signature: dotted leader between name and price */
  .item .leader {
    flex: 1;
    border-bottom: 2px dotted var(--line);
    transform: translateY(-4px);
  }
  .item .price {
    font-family: var(--display);
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .item .desc {
    margin-top: 0.3rem;
    color: var(--ink-soft);
    font-size: 0.9rem;
    line-height: 1.45;
    max-width: 52ch;
  }

  footer {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.8rem;
    padding: 2rem 1rem 3rem;
    border-top: 1px solid var(--line);
  }

  .status {
    text-align: center;
    color: var(--ink-soft);
    padding: 3rem 1rem;
  }
</style>
</head>
<body>
  <header>
    <div class="crest">✦ Menu ✦</div>
    <h1 id="restaurant-name">Osteria Marconi</h1>
    <p class="tagline" id="restaurant-tagline"></p>
  </header>

  <nav id="category-nav" aria-label="Menu categories"></nav>

  <main id="menu">
    <p class="status">Loading menu…</p>
  </main>

  <footer>Prices include tax · Ask your server about allergens</footer>

      { name: "Dolci", items: [

        { name: "Panna cotta", desc: "Vanilla cream, berry coulis", price: 6 },
      ]},
    ],
  };

  const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "-");

  function render(data) {
    document.getElementById("restaurant-name").textContent = data.restaurant;
    document.getElementById("restaurant-tagline").textContent = data.tagline || "";
    document.title = data.restaurant + " — Menu";

    const nav = document.getElementById("category-nav");
    const main = document.getElementById("menu");
    nav.innerHTML = "";
    main.innerHTML = "";

    for (const cat of data.categories) {
      const id = slug(cat.name);

      const link = document.createElement("a");
      link.href = "#" + id;
      link.textContent = cat.name;
      link.dataset.target = id;
      nav.appendChild(link);

      const section = document.createElement("section");
      section.id = id;
      section.innerHTML = "<h2>" + cat.name + "</h2>";
      for (const item of cat.items) {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML =
          '<div class="content">' +
            '<div class="row">' +
              '<span class="name"></span>' +
              '<span class="leader"></span>' +
              '<span class="price"></span>' +
            "</div>" +
            '<p class="desc"></p>' +
          "</div>";
        div.querySelector(".name").textContent = item.name;
        div.querySelector(".price").textContent = "€" + item.price;
        div.querySelector(".desc").textContent = item.desc || "";

        if (item.image) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.src = item.image;
          img.alt = item.name;
          img.loading = "lazy";
          // If the URL is broken, just remove the photo — layout stays clean
          img.onerror = () => img.remove();
          div.prepend(img);
        }
        section.appendChild(div);
      }
      main.appendChild(section);
    }

    // Scroll-spy: highlight the category currently in view
    const links = [...nav.querySelectorAll("a")];
    const observer = new IntersectionObserver(
      (entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            links.forEach((l) =>
              l.classList.toggle("active", l.dataset.target === entry.target.id)
            );
          }
        }
      },
      { rootMargin: "-40% 0px -55% 0px" }
    );
    main.querySelectorAll("section").forEach((s) => observer.observe(s));
  }

  async function load() {
    try {
      const res = await fetch("/api/menu");
      if (!res.ok) throw new Error("HTTP " + res.status);
      render(await res.json());
    } catch {
      // Function not deployed yet (e.g. local preview) — use fallback
      render(FALLBACK);
    }
  }
  load();
</script>
</body>
</html>
